<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe Atmiņas Spēle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Pepe Atmiņas Spēle</h1>
    
    <div class="difficulty-container">
        <button class="diff-btn" data-pairs="4">Viegls (4 pāri)</button>
        <button class="diff-btn active" data-pairs="8">Vidējs (8 pāri)</button>
        <button class="diff-btn" data-pairs="12">Grūts (12 pāri)</button>
        <button class="diff-btn extreme-btn" data-pairs="24">Extreme (24 pāri)</button>
    </div>

    <div class="stats">
        Gājieni: <span id="moves">0</span> | Atrastie pāri: <span id="matches">0</span>/<span id="total-matches">8</span>
    </div>

    <div class="game-grid" id="grid"></div>

    <button class="reset-btn" id="reset-btn">Sākt no jauna</button>

    <script src="script.js"></script>
</body>
</html>
