<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe Atmiņas Spēle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="language-container">
        <button class="lang-btn active" data-lang="lv">LV</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ru">RU</button>
    </div>

    <h1 id="game-title">Pepe Atmiņas Spēle</h1>
    
    <div class="difficulty-container">
        <button class="diff-btn" data-pairs="4" id="btn-easy">Viegls (4 pāri)</button>
        <button class="diff-btn active" data-pairs="8" id="btn-medium">Vidējs (8 pāri)</button>
        <button class="diff-btn" data-pairs="12" id="btn-hard">Grūts (12 pāri)</button>
        <button class="diff-btn extreme-btn" data-pairs="24" id="btn-extreme">Extreme (24 pāri)</button>
    </div>

    <div class="stats">
        <span id="text-moves">Gājieni</span>: <span id="moves">0</span> | 
        <span id="text-matches">Atrastie pāri</span>: <span id="matches">0</span>/<span id="total-matches">8</span>
    </div>

    <div class="game-grid" id="grid"></div>

    <button class="reset-btn" id="reset-btn">Sākt no jauna</button>

    <script src="script.js"></script>
</body>
</html>
